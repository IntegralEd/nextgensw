[build]
  publish = "."

  # Netlify's secrets scanner sees AIRTABLE_BASE_ID set as an env var
  # AND appearing in committed files (the schema snapshot, scripts,
  # docs) and assumes a leak. Base IDs are NOT secrets — they're
  # public identifiers visible in any Airtable share URL. Only the
  # PAT is sensitive, and that's never committed. So we whitelist
  # the base ID for scanning.
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = "AIRTABLE_BASE_ID"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    # frame-ancestors replaces X-Frame-Options and supports allowlists.
    # Allow self + Softr (workspace and admin domains) so the Softr
    # /website-review page can iframe the live site for the admin
    # review workflow. Block everything else.
    Content-Security-Policy = "frame-ancestors 'self' https://*.softr.app https://*.softr.io https://*.softrapp.com"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# HTML is never cached — always revalidate so deploys propagate immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS/JS — short cache with revalidation. We don't content-hash filenames,
# so anything longer means deploys take effect on a delay.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Images / fonts / SVGs change rarely — 1 day is plenty.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
